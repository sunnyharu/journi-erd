<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive ERD — Database Schema</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #11111b;
    color: #cdd6f4;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────────────────────── */
  #header {
    height: 50px;
    background: #181825;
    border-bottom: 1px solid #313244;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 100;
    overflow-x: auto;
  }
  #header h1 {
    font-size: 14px;
    font-weight: 700;
    color: #cdd6f4;
    white-space: nowrap;
    margin-right: 8px;
  }
  .domain-btn {
    padding: 3px 10px;
    border-radius: 12px;
    border: 1.5px solid transparent;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s, background 0.15s;
    background: transparent;
  }
  .domain-btn.active {
    border-color: var(--color);
    color: var(--color);
  }
  .domain-btn.inactive {
    border-color: #45475a;
    color: #585b70;
  }

  /* ── Canvas ─────────────────────────────────────────────────────── */
  #canvas-wrap {
    flex: 1;
    overflow: auto;
    position: relative;
  }
  #canvas {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 20px;
    padding: 20px;
    min-height: 100%;
    position: relative;
  }

  /* ── SVG overlay ─────────────────────────────────────────────────── */
  #svg-overlay {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 50;
  }

  /* ── Domain column ──────────────────────────────────────────────── */
  .domain-col {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .domain-label {
    position: sticky;
    top: 0;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    z-index: 10;
    background: #181825;
    border: 1px solid var(--color);
    color: var(--color);
  }

  /* ── Table card ─────────────────────────────────────────────────── */
  .table-card {
    background: #1e1e2e;
    border-radius: 8px;
    border-left: 3px solid var(--color);
    overflow: hidden;
    transition: box-shadow 0.2s, opacity 0.2s, filter 0.2s;
  }
  .table-card.highlighted {
    box-shadow: 0 0 0 2px var(--color), 0 0 20px color-mix(in srgb, var(--color) 30%, transparent);
  }
  .table-card.dimmed {
    opacity: 0.25;
    filter: saturate(0.3);
  }

  /* ── Table header ───────────────────────────────────────────────── */
  .table-header {
    background: color-mix(in srgb, var(--color) 18%, #1e1e2e);
    padding: 6px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid color-mix(in srgb, var(--color) 25%, #313244);
    transition: background 0.15s;
  }
  .table-header:hover {
    background: color-mix(in srgb, var(--color) 30%, #1e1e2e);
  }
  .table-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--color);
  }
  .fk-badge {
    background: #313244;
    color: #a6adc8;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 600;
  }

  /* ── Column rows ────────────────────────────────────────────────── */
  .col-row {
    padding: 2px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    min-height: 22px;
    transition: background 0.15s;
    position: relative;
  }
  .col-row.pk-row {
    background: rgba(249, 226, 175, 0.06);
  }
  .col-row.fk-row {
    cursor: pointer;
  }
  .col-row.fk-row:hover {
    background: rgba(137, 180, 250, 0.12);
  }
  .col-row.audit-row {
    opacity: 0.45;
    min-height: 18px;
  }
  .col-row.col-highlighted {
    background: rgba(249, 226, 175, 0.22) !important;
    opacity: 1 !important;
  }
  .col-row.fk-col-highlighted {
    background: rgba(137, 180, 250, 0.25) !important;
    opacity: 1 !important;
  }

  .badge {
    font-size: 9px;
    font-weight: 700;
    padding: 0px 4px;
    border-radius: 3px;
    flex-shrink: 0;
    line-height: 14px;
  }
  .badge.pk { background: #f9e2af; color: #1e1e2e; }
  .badge.fk { background: #89b4fa; color: #1e1e2e; }

  .col-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .col-row.fk-row .col-name { color: #89b4fa; }
  .col-row.pk-row .col-name { color: #f9e2af; }
  .col-row.audit-row .col-name { color: #585b70; }

  .col-type {
    color: #6c7086;
    font-size: 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Tooltip ────────────────────────────────────────────────────── */
  #tooltip {
    position: fixed;
    background: #181825;
    border: 1px solid #45475a;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    color: #cdd6f4;
    pointer-events: none;
    z-index: 200;
    max-width: 340px;
    line-height: 1.6;
    display: none;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  #tooltip .tt-title {
    font-weight: 700;
    font-size: 12px;
    margin-bottom: 4px;
    color: #cdd6f4;
  }
  #tooltip .tt-item {
    color: #a6adc8;
    font-size: 10.5px;
  }
  #tooltip .tt-arrow { color: #89b4fa; }
  #tooltip .tt-out { color: #f38ba8; }
  #tooltip .tt-in { color: #a6e3a1; }
  .tt-col   { font-family: monospace; color: #89b4fa; font-size: 12px; margin-bottom: 4px; }
  .tt-desc  { color: #cdd6f4; font-size: 11px; margin: 4px 0 6px; line-height: 1.5; }
  .tt-section { color: #6c7086; font-size: 10px; font-weight: 600; text-transform: uppercase; margin: 6px 0 2px; letter-spacing: 0.05em; }
  .tt-enums { color: #f9e2af; font-size: 10px; font-family: monospace; }

  /* SQL Query Panel */
  #query-panel {
    position: fixed; top: 50px; right: -420px; width: 420px;
    bottom: 0; background: #181825; border-left: 1px solid #313244;
    z-index: 90; transition: right 0.3s ease; display: flex; flex-direction: column;
  }
  #query-panel.open { right: 0; }
  #query-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid #313244;
    font-size: 13px; font-weight: 600; color: #cdd6f4; flex-shrink: 0;
  }
  #query-panel-close {
    background: none; border: none; color: #6c7086; cursor: pointer;
    font-size: 16px; padding: 2px 6px; border-radius: 4px;
  }
  #query-panel-close:hover { background: #313244; color: #cdd6f4; }
  #query-panel-body { flex: 1; overflow-y: auto; padding: 12px; }
  #query-category-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .qcat-btn {
    padding: 3px 10px; border-radius: 4px; border: 1px solid #313244;
    background: #1e1e2e; color: #a6adc8; font-size: 11px; cursor: pointer;
  }
  .qcat-btn.active { background: #313244; color: #cdd6f4; border-color: #45475a; }
  .query-item {
    background: #1e1e2e; border: 1px solid #313244; border-radius: 6px;
    margin-bottom: 10px; overflow: hidden;
  }
  .query-item-header {
    padding: 8px 12px; font-size: 11px; font-weight: 600;
    color: #a6e3a1; cursor: pointer; display: flex; justify-content: space-between;
    align-items: center;
  }
  .query-item-header:hover { background: #252535; }
  .query-item-body { display: none; padding: 0; }
  .query-item-body.open { display: block; }
  .query-item pre {
    margin: 0; padding: 12px; font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 10.5px; color: #cdd6f4; overflow-x: auto; white-space: pre;
    background: #11111b; border-top: 1px solid #313244; line-height: 1.6;
  }
  .copy-btn {
    font-size: 10px; padding: 2px 8px; background: #313244;
    border: none; border-radius: 3px; color: #a6adc8; cursor: pointer;
  }
  .copy-btn:hover { background: #45475a; color: #cdd6f4; }
  #query-panel-btn {
    position: fixed; top: 12px; right: 16px; z-index: 110;
    padding: 5px 12px; background: #313244; border: 1px solid #45475a;
    border-radius: 5px; color: #a6e3a1; font-size: 11px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  #query-panel-btn:hover { background: #45475a; }

  /* ── Focus mode layout ──────────────────────────────────────────── */
  #canvas.focus-mode {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 32px;
    padding: 24px 32px;
    min-height: 100%;
  }
  .focus-col {
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 280px;
    flex-shrink: 0;
  }
  .focus-col.center-col {
    min-width: 300px;
    align-self: flex-start;
  }
  .focus-col-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #585b70;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid #313244;
    text-align: center;
    white-space: nowrap;
  }
  .focus-col-label.label-center { color: #cdd6f4; border-color: #45475a; }
  .focus-col-label.label-out    { color: #89b4fa; border-color: #89b4fa33; }
  .focus-col-label.label-in     { color: #a6e3a1; border-color: #a6e3a133; }

  /* Overview button (shown only in focus mode) */
  #overview-btn {
    display: none;
    padding: 4px 12px;
    background: #313244;
    border: 1px solid #45475a;
    border-radius: 5px;
    color: #cdd6f4;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  #overview-btn:hover { background: #45475a; }
  body.focus-mode #overview-btn { display: inline-flex; align-items: center; gap: 4px; }
  body.focus-mode .domain-btn   { display: none; }

  /* ── Column Search ──────────────────────────────────────────────── */
  #col-search-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    flex-shrink: 0;
  }
  body.focus-mode #col-search-wrap { display: none; }

  #col-search {
    background: #1e1e2e;
    border: 1px solid #45475a;
    border-radius: 6px;
    color: #cdd6f4;
    font-family: inherit;
    font-size: 11px;
    padding: 4px 10px 4px 28px;
    width: 200px;
    outline: none;
    transition: border-color 0.15s, width 0.2s;
  }
  #col-search:focus {
    border-color: #89b4fa;
    width: 260px;
  }
  #col-search::placeholder { color: #45475a; }
  #col-search-icon {
    position: absolute;
    left: 8px;
    color: #45475a;
    font-size: 12px;
    pointer-events: none;
  }
  #col-search-container {
    position: relative;
    display: flex;
    align-items: center;
  }
  #col-search-clear {
    position: absolute;
    right: 7px;
    background: none;
    border: none;
    color: #585b70;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 0;
    display: none;
  }
  #col-search-clear:hover { color: #cdd6f4; }
  #col-search-count {
    font-size: 10px;
    color: #a6adc8;
    white-space: nowrap;
    min-width: 60px;
  }
  #col-search-count.no-result { color: #f38ba8; }

  /* 검색 결과 하이라이트 */
  .col-row.search-match {
    background: rgba(166, 227, 161, 0.18) !important;
    opacity: 1 !important;
  }
  .col-row.search-match .col-name {
    color: #a6e3a1 !important;
  }

  /* ── Search Results Panel ─────────────────────────────────────── */
  #search-results-panel {
    display: none;
    flex-direction: column;
    padding: 20px;
    gap: 14px;
    min-height: 100%;
  }
  #search-results-panel.active { display: flex; }

  #search-results-header {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: #a6adc8;
    padding: 7px 12px;
    background: #181825;
    border-radius: 6px;
    border: 1px solid #313244;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  #search-results-header strong { color: #a6e3a1; }
  #search-results-header .sr-count { color: #585b70; margin-left: auto; }

  #search-results-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-content: flex-start;
    align-items: flex-start;
  }
  #search-results-grid .table-card {
    width: 280px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="header">
  <h1>Database ERD</h1>
  <button id="overview-btn" onclick="exitFocusMode()">← Overview</button>
  <div id="col-search-wrap">
    <div id="col-search-container">
      <span id="col-search-icon">🔍</span>
      <input id="col-search" type="text" placeholder="컬럼명 검색..." autocomplete="off" spellcheck="false" />
      <button id="col-search-clear" title="검색 초기화">✕</button>
    </div>
    <span id="col-search-count"></span>
  </div>
  <button id="query-panel-btn" onclick="toggleQueryPanel()">📋 SQL 쿼리</button>
</div>

<!-- SQL Query Panel -->
<div id="query-panel">
  <div id="query-panel-header">
    <span>📋 SQL Query Reference</span>
    <button id="query-panel-close" onclick="toggleQueryPanel()">✕</button>
  </div>
  <div id="query-panel-body">
    <div id="query-category-tabs"></div>
    <div id="query-list"></div>
  </div>
</div>

<div id="canvas-wrap">
  <div id="canvas">
    <svg id="svg-overlay"><defs></defs></svg>
  </div>
  <div id="search-results-panel">
    <div id="search-results-header">
      🔍 <span id="sr-query"></span>
      <span class="sr-count" id="sr-count"></span>
    </div>
    <div id="search-results-grid"></div>
  </div>
</div>
<div id="tooltip"></div>

// ═══════════════════════════════════════════════════════════════════
// BUILD FK INDEX
// ═══════════════════════════════════════════════════════════════════

// fkIndex[tableName] = { out: [{srcCol, dstTable, dstCol}], in: [{srcTable, srcCol, dstCol}] }
const fkIndex = {};
TABLES.forEach(t => { fkIndex[t.name] = { out: [], in: [] }; });

// 1. 명시적 FK 어노테이션 기반
TABLES.forEach(t => {
  t.cols.forEach(([colName, colType, flags]) => {
    const parts = flags.split('|');
    parts.forEach(f => {
      if (f.startsWith('FK:')) {
        const ref = f.slice(3);
        const dotIdx = ref.indexOf('.');
        const dstTable = ref.slice(0, dotIdx);
        const dstCol = ref.slice(dotIdx + 1);
        if (fkIndex[t.name]) {
          fkIndex[t.name].out.push({ srcCol: colName, dstTable, dstCol });
        }
        if (fkIndex[dstTable]) {
          fkIndex[dstTable].in.push({ srcTable: t.name, srcCol: colName, dstCol });
        }
      }
    });
  });
});

// 2. 명명 규칙 기반 역방향 추론:
//    table_name_ro.id  ←→  다른 테이블의 {table_name}_id 컬럼
//    예: cart_ro.id ↔ cart_line_ro.cart_id
const tableNameMap = {}; // 'cart' → 'cart_ro'
TABLES.forEach(t => {
  const base = t.name.replace(/_ro$/, '');
  tableNameMap[base] = t.name;
});

TABLES.forEach(t => {
  t.cols.forEach(([colName, colType, flags]) => {
    // *_id 컬럼에서 명시적 FK가 없으면 명명 규칙으로 추론
    const alreadyHasFK = flags.split('|').some(f => f.startsWith('FK:'));
    if (!alreadyHasFK && colName.endsWith('_id')) {
      const base = colName.replace(/_id$/, '');
      const dstTable = tableNameMap[base];
      if (dstTable && dstTable !== t.name) {
        // dst 테이블에 id 또는 _id 컬럼 있는지 확인
        const dstTableDef = TABLES.find(x => x.name === dstTable);
        const dstIdCol = dstTableDef?.cols.find(([c]) => c === 'id' || c === '_id');
        if (dstIdCol) {
          const dstCol = dstIdCol[0];
          // 중복 방지
          const exists = fkIndex[t.name].out.some(o => o.srcCol === colName && o.dstTable === dstTable);
          if (!exists) {
            fkIndex[t.name].out.push({ srcCol: colName, dstTable, dstCol });
            fkIndex[dstTable].in.push({ srcTable: t.name, srcCol: colName, dstCol });
          }
        }
      }
    }
  });
});

const canvas = document.getElementById('canvas');

// Domain visibility state

// Build domain filter buttons
const h1 = header.querySelector('h1');
DOMAIN_ORDER.forEach(domain => {
  const color = DOMAIN_COLORS[domain];

  btn.dataset.domain = domain;

function toggleDomain(domain, btn) {
  if (focusState) return; // domain filter only works in overview mode
  domainVisible[domain] = !domainVisible[domain];
  btn.className = 'domain-btn ' + (domainVisible[domain] ? 'active' : 'inactive');
  const col = document.querySelector(`.domain-col[data-domain="${domain}"]`);
  if (col) col.style.display = domainVisible[domain] ? 'flex' : 'none';
}

// Group tables by domain
const byDomain = {};
DOMAIN_ORDER.forEach(d => byDomain[d] = []);
TABLES.forEach(t => { if (byDomain[t.domain]) byDomain[t.domain].push(t); });

// Build SVG defs (arrowhead per domain color)
const defs = svgEl.querySelector('defs');
DOMAIN_ORDER.forEach(domain => {
  const color = DOMAIN_COLORS[domain];
  const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  marker.setAttribute('id', `arrow-${domain}`);
  marker.setAttribute('markerWidth', '8');
  marker.setAttribute('markerHeight', '8');

  marker.setAttribute('refY', '3');
  marker.setAttribute('orient', 'auto');
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', 'M0,0 L0,6 L8,3 z');
  path.setAttribute('fill', color);
  marker.appendChild(path);
  defs.appendChild(marker);
});

// Helper: column element ID
function colId(tableName, colName) {
  return `col-${tableName}-${colName}`;
}

// Helper: check if column is audit
const AUDIT_COLS = new Set(['created_at','updated_at','created_ip','updated_ip','deleted_at','createdat','updatedat','deletedat']);

// Render domain columns
DOMAIN_ORDER.forEach(domain => {
  const color = DOMAIN_COLORS[domain];
  const col = document.createElement('div');
  col.className = 'domain-col';
  col.dataset.domain = domain;
  col.style.setProperty('--color', color);

  const label = document.createElement('div');
  label.className = 'domain-label';
  label.style.setProperty('--color', color);
  label.textContent = domain.toUpperCase();
  col.appendChild(label);

  byDomain[domain].forEach(table => {
    col.appendChild(buildTableCard(table));
  });

  canvas.appendChild(col);
});

function buildTableCard(table) {
  const color = DOMAIN_COLORS[table.domain];
  const fkCount = (fkIndex[table.name].out.length + fkIndex[table.name].in.length);

  const card = document.createElement('div');
  card.className = 'table-card';
  card.style.setProperty('--color', color);
  card.dataset.table = table.name;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'table-header';
  hdr.dataset.table = table.name;

  const nameEl = document.createElement('span');
  nameEl.className = 'table-name';
  nameEl.textContent = table.name;

  const badge = document.createElement('span');
  badge.className = 'fk-badge';
  badge.textContent = fkCount + ' FK';

  hdr.appendChild(nameEl);
  hdr.appendChild(badge);
  card.appendChild(hdr);

  // Columns
  table.cols.forEach(([colName, colType, flags]) => {
    const flagParts = flags.split('|');
    const isPK = flagParts.includes('PK');
    const fkFlag = flagParts.find(f => f.startsWith('FK:'));
    const isAudit = !isPK && !fkFlag && AUDIT_COLS.has(colName);

    const row = document.createElement('div');
    row.className = 'col-row';
    row.id = colId(table.name, colName);

    if (isPK) row.classList.add('pk-row');
    else if (fkFlag) row.classList.add('fk-row');
    else if (isAudit) row.classList.add('audit-row');

    // 모든 컬럼에 클릭 이벤트 (FK든 PK든 일반 컬럼이든)
    row.dataset.srcTable = table.name;
    row.dataset.srcCol = colName;
    if (fkFlag) {
      const ref = fkFlag.slice(3);
      const dotIdx = ref.indexOf('.');
      row.dataset.fkTable = ref.slice(0, dotIdx);
      row.dataset.fkCol = ref.slice(dotIdx + 1);
    }
    row.style.cursor = 'pointer';
    row.addEventListener('click', (e) => {
      e.stopPropagation();
      handleColClick(row);
    });

    // Add description and enum
    const desc = (COL_DESCS[table.name] || {})[colName] || '';
    if (desc) row.dataset.desc = desc;
    const enums = (ENUM_VALS[table.name] || {})[colName];
    if (enums) row.dataset.enum = enums.join(' · ');

    // Badges
    if (isPK) {
      const b = document.createElement('span');
      b.className = 'badge pk';
      b.textContent = 'PK';
      row.appendChild(b);
    }
    if (fkFlag) {
      const b = document.createElement('span');
      b.className = 'badge fk';
      b.textContent = 'FK';
      row.appendChild(b);
    }

    const nameSpan = document.createElement('span');
    nameSpan.className = 'col-name';
    nameSpan.textContent = colName;
    row.appendChild(nameSpan);

    const typeSpan = document.createElement('span');
    typeSpan.className = 'col-type';
    typeSpan.textContent = colType;
    row.appendChild(typeSpan);

    card.appendChild(row);
  });

  return card;
}

function syncSvgSize() {
  const w = canvas.scrollWidth;
  const h = canvas.scrollHeight;
  svgEl.setAttribute('width', w);
  svgEl.setAttribute('height', h);
  svgEl.style.width = w + 'px';
  svgEl.style.height = h + 'px';
}

function clearLines() {
  const lines = svgEl.querySelectorAll('.erd-line');
  lines.forEach(l => l.remove());
}

function getCenter(el, side) {
  // side: 'right' or 'left'
  const rect = el.getBoundingClientRect();
  const wrapRect = canvasWrap.getBoundingClientRect();
  const scrollLeft = canvasWrap.scrollLeft;
  const scrollTop = canvasWrap.scrollTop;

  const x = side === 'right'
    ? rect.right - wrapRect.left + scrollLeft
    : rect.left - wrapRect.left + scrollLeft;
  const y = rect.top - wrapRect.top + scrollTop + rect.height / 2;
  return { x, y };
}

function drawLine(srcEl, dstEl, color, domain) {
  if (!srcEl || !dstEl) return;

  const src = getCenter(srcEl, 'right');
  const dst = getCenter(dstEl, 'left');

  // Determine if same side (same approximate x) → exit left
  const sameSide = Math.abs(src.x - dst.x) < 320;

  let d;
  if (sameSide) {
    // Both elements in same column area: exit and enter from left
    const srcL = getCenter(srcEl, 'left');
    const dstL = getCenter(dstEl, 'left');
    const offset = 28;
    const sx = srcL.x - offset;
    const dx = dstL.x - offset;
    d = `M${srcL.x},${srcL.y} C${sx - 40},${srcL.y} ${dx - 40},${dstL.y} ${dstL.x},${dstL.y}`;
  } else {
    const midX = (src.x + dst.x) / 2;
    const cpOffset = Math.min(Math.abs(dst.x - src.x) * 0.45, 150);
    const cp1x = src.x + cpOffset;
    const cp2x = dst.x - cpOffset;
    d = `M${src.x},${src.y} C${cp1x},${src.y} ${cp2x},${dst.y} ${dst.x},${dst.y}`;
  }

  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', d);
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', '1.8');
  path.setAttribute('fill', 'none');
  path.setAttribute('opacity', '0.9');
  path.setAttribute('marker-end', `url(#arrow-${domain})`);
  path.classList.add('erd-line');
  svgEl.appendChild(path);
}

// ═══════════════════════════════════════════════════════════════════
// COLUMN SEARCH  (카드를 검색결과 패널로 모아서 보여주는 방식)
// ═══════════════════════════════════════════════════════════════════
(function initColSearch() {
  const input      = document.getElementById('col-search');
  const clearBtn   = document.getElementById('col-search-clear');
  const countEl    = document.getElementById('col-search-count');
  const panel      = document.getElementById('search-results-panel');
  const grid       = document.getElementById('search-results-grid');
  const srQuery    = document.getElementById('sr-query');
  const srCount    = document.getElementById('sr-count');
  const mainCanvas = document.getElementById('canvas');

  // 카드의 원래 위치를 기억 (card -> {parent, nextSibling})
  const cardOrigin = new Map();
  let searchActive = false;

  function enterSearchMode(matchingCards, q) {
    if (!searchActive) {
      // 처음 진입 시 canvas 숨기고 panel 열기
      mainCanvas.style.display = 'none';
      panel.classList.add('active');
      searchActive = true;
    }

    // grid 비우기 (이전 검색 결과 초기화 — 카드는 이미 origin에 기억됨)
    // 기존 카드 모두 원위치 복원 후 재이동
    restoreCards();

    // 매칭 카드를 grid로 이동
    matchingCards.forEach(card => {
      cardOrigin.set(card, {
        parent: card.parentElement,
        next:   card.nextSibling,
      });
      grid.appendChild(card);
    });

    // 헤더 텍스트
    srQuery.innerHTML = `<strong>"${q}"</strong> 검색 결과`;
    srCount.textContent = `${matchingCards.length}개 테이블 · ${matchingCards.reduce((s,c)=>s+c.querySelectorAll('.col-row.search-match').length,0)}개 컬럼`;
  }

  function restoreCards() {
    cardOrigin.forEach(({parent, next}, card) => {
      if (next && next.parentElement === parent) {
        parent.insertBefore(card, next);
      } else {
        parent.appendChild(card);
      }
    });
    cardOrigin.clear();
  }

  function exitSearchMode() {
    restoreCards();
    grid.innerHTML = '';
    panel.classList.remove('active');
    mainCanvas.style.display = '';
    searchActive = false;
  }

  function clearColHighlights() {
    document.querySelectorAll('.col-row.search-match')
      .forEach(r => r.classList.remove('search-match'));
  }

  function applySearch(query) {
    const q = query.trim().toLowerCase();

    clearColHighlights();

    if (!q) {
      clearBtn.style.display = 'none';
      countEl.textContent = '';
      countEl.className = 'col-search-count';
      exitSearchMode();
      return;
    }

    clearBtn.style.display = 'block';

    const matchingCards = [];
    let totalMatchedCols = 0;

    // 전체 테이블 카드 순회 (canvas + grid 모두)
    const allCards = Array.from(document.querySelectorAll('.table-card'));
    allCards.forEach(card => {
      const rows = card.querySelectorAll('.col-row');
      let hasMatch = false;

      rows.forEach(row => {
        const colName   = (row.dataset.srcCol  || '').toLowerCase();
        const tableName = (row.dataset.srcTable || '').toLowerCase();
        const hit = colName.includes(q) || tableName.includes(q);
        if (hit) {
          row.classList.add('search-match');
          hasMatch = true;
          totalMatchedCols++;
        }
      });

      // 테이블명 자체가 검색어에 매칭되는 경우 카드 전체 포함
      const cardTable = (card.dataset.table || '').toLowerCase();
      if (cardTable.includes(q) && !hasMatch) {
        hasMatch = true;
        // 테이블명 매칭 시 모든 컬럼 하이라이트 없이 카드만 포함
      }

      if (hasMatch) matchingCards.push(card);
    });

    if (matchingCards.length === 0) {
      countEl.textContent = '결과 없음';
      countEl.className = 'col-search-count no-result';
      exitSearchMode();
      return;
    }

    countEl.textContent = `${matchingCards.length}개 테이블`;
    countEl.className = 'col-search-count';
    enterSearchMode(matchingCards, query.trim());
  }

  input.addEventListener('input', () => applySearch(input.value));

  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      input.value = '';
      applySearch('');
      input.blur();
    }
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    applySearch('');
    input.focus();
  });

  // focus mode 진입 시 검색 초기화
  const _handleColClick = window.handleColClick;
  document.addEventListener('focusmode:enter', () => {
    if (searchActive) {
      input.value = '';
      applySearch('');
    }
  });
})();

function dimAllExcept(tableNames) {
  const set = new Set(tableNames);
  document.querySelectorAll('.table-card').forEach(card => {
    const tname = card.dataset.table;
    if (set.has(tname)) {
      card.classList.remove('dimmed');
      card.classList.add('highlighted');
    } else {
      card.classList.add('dimmed');
      card.classList.remove('highlighted');
    }
  });
}

function showTooltip(html, evt) {
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  positionTooltip(evt);
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

function positionTooltip(evt) {
  const pad = 14;
  let x = evt.clientX + pad;
  let y = evt.clientY + pad;
  const tw = tooltip.offsetWidth || 200;
  const th = tooltip.offsetHeight || 100;
  if (x + tw > window.innerWidth - 10) x = evt.clientX - tw - pad;
  if (y + th > window.innerHeight - 10) y = evt.clientY - th - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

// ── Focus mode ───────────────────────────────────────────────────────

function handleColClick(row) {
  const srcTable = row.dataset.srcTable;
  const srcCol   = row.dataset.srcCol;

  // 같은 컬럼 다시 클릭 → overview 복귀
  if (focusState && focusState.table === srcTable && focusState.col === srcCol) {
    exitFocusMode();
    return;
  }

  // 클릭한 컬럼 기준으로 연결 관계 조회
  const colRels = getColRelations(srcTable, srcCol);

  // 연결 관계가 전혀 없으면 무시
  if (colRels.out.length === 0 && colRels.in.length === 0) return;

  enterFocusMode(srcTable, srcCol, colRels);
}

// 특정 컬럼 기준으로 연결된 관계만 추출
function getColRelations(tableName, colName) {
  const allRels = fkIndex[tableName];
  const out = allRels.out.filter(r => r.srcCol === colName);
  const inRels = allRels.in.filter(r => r.dstCol === colName);

  // id / _id 컬럼이면 in 방향도 포함
  // dstCol이 id or _id인 경우도 포함
  const allIn = allRels.in.filter(r => {
    const dstColName = r.dstCol;
    return dstColName === colName;
  });

  return { out, in: allIn };
}

function enterFocusMode(tableName, clickedCol, colRels) {
  focusState = { table: tableName, col: clickedCol };
  document.body.classList.add('focus-mode');

  clearLines();
  hideTooltip();

  canvas.querySelectorAll('.domain-col, .focus-col').forEach(el => el.remove());
  canvas.classList.add('focus-mode');

  const sourceTable = TABLES.find(t => t.name === tableName);
  if (!sourceTable) return;

  // 연결된 테이블 추출
  const outTableNames = [...new Set(colRels.out.map(r => r.dstTable))];
  const inTableNames  = [...new Set(colRels.in.map(r => r.srcTable))];
  const outTables = outTableNames.map(n => TABLES.find(t => t.name === n)).filter(Boolean);
  const inTables  = inTableNames.map(n => TABLES.find(t => t.name === n)).filter(Boolean);

  // ── 왼쪽: 클릭한 소스 테이블 ──────────────────────────────────
  const leftCol = document.createElement('div');
  leftCol.className = 'focus-col center-col';
  const leftLabel = document.createElement('div');
  leftLabel.className = 'focus-col-label label-center';
  leftLabel.textContent = `${tableName}  ·  ${clickedCol}`;
  leftCol.appendChild(leftLabel);
  leftCol.appendChild(buildTableCard(sourceTable));
  canvas.appendChild(leftCol);

  // ── 오른쪽: 연관 테이블 전체 (in → out 순) ───────────────────
  const rightCol = document.createElement('div');
  rightCol.className = 'focus-col';

  if (inTables.length > 0) {
    const inLabel = document.createElement('div');
    inLabel.className = 'focus-col-label label-in';
    inLabel.textContent = `← 이 컬럼을 참조 (${inTables.length})`;
    rightCol.appendChild(inLabel);
    inTables.forEach(t => rightCol.appendChild(buildTableCard(t)));
  }

  if (outTables.length > 0) {
    const outLabel = document.createElement('div');
    outLabel.className = 'focus-col-label label-out';
    outLabel.textContent = `→ 참조 대상 (${outTables.length})`;
    rightCol.appendChild(outLabel);
    outTables.forEach(t => rightCol.appendChild(buildTableCard(t)));
  }

  if (inTables.length + outTables.length > 0) canvas.appendChild(rightCol);

  // ── SVG 선 그리기 ──────────────────────────────────────────────
  requestAnimationFrame(() => {
    syncSvgSize();

    // 클릭한 컬럼 하이라이트
    const clickedEl = document.getElementById(colId(tableName, clickedCol));
    if (clickedEl) clickedEl.classList.add('fk-col-highlighted');

    // out 방향 선 (left → right)
    colRels.out.forEach(({ srcCol, dstTable, dstCol }) => {
      const srcEl = document.getElementById(colId(tableName, srcCol));
      const dstEl = document.getElementById(colId(dstTable, dstCol));
      if (dstEl) dstEl.classList.add('col-highlighted');
      const domain = sourceTable.domain;
      drawLine(srcEl || clickedEl, dstEl, DOMAIN_COLORS[domain] || '#89b4fa', domain);
    });

    // in 방향 선 (right → left)
    colRels.in.forEach(({ srcTable, srcCol, dstCol }) => {
      const srcEl = document.getElementById(colId(srcTable, srcCol));
      const dstEl = document.getElementById(colId(tableName, dstCol));
      if (srcEl) srcEl.classList.add('fk-col-highlighted');
      const inDomain = TABLES.find(t => t.name === srcTable)?.domain || 'user';
      drawLine(srcEl, dstEl || clickedEl, DOMAIN_COLORS[inDomain] || '#a6e3a1', inDomain);
    });
  });
}

function exitFocusMode() {
  focusState = null;
  document.body.classList.remove('focus-mode');
  canvas.classList.remove('focus-mode');

  // Remove focus layout
  const focusCols = canvas.querySelectorAll('.focus-col');
  focusCols.forEach(el => el.remove());
  clearLines();

  // Re-render domain columns
  DOMAIN_ORDER.forEach(domain => {
    const color = DOMAIN_COLORS[domain];
    const col = document.createElement('div');
    col.className = 'domain-col';
    col.dataset.domain = domain;
    col.style.setProperty('--color', color);
    col.style.display = domainVisible[domain] ? 'flex' : 'none';

    const label = document.createElement('div');
    label.className = 'domain-label';
    label.style.setProperty('--color', color);
    label.textContent = domain.toUpperCase();
    col.appendChild(label);

    byDomain[domain].forEach(table => {
      col.appendChild(buildTableCard(table));
    });

    canvas.appendChild(col);
  });

  requestAnimationFrame(() => syncSvgSize());
}

// ── Hover interactions (overview mode only) ─────────────────────────

// FK column hover
document.addEventListener('mouseover', (evt) => {
  if (focusState) return; // no hover effects in focus mode
  const tableHdr = evt.target.closest('.table-header');
  const colRow = evt.target.closest('.col-row');

  if (tableHdr) { handleTableHover(tableHdr, evt); return; }
  if (colRow)   { handleColHover(colRow, evt); return; }
});

document.addEventListener('mousemove', (evt) => {
  if (tooltip.style.display === 'block') {
    positionTooltip(evt);
  }
});

document.addEventListener('mouseout', (evt) => {
  if (focusState) return;
  const tableHdr = evt.target.closest('.table-header');
  const colRow = evt.target.closest('.col-row');
  if (!colRow && !tableHdr) return;

  const related = evt.relatedTarget;
  if (related && (related.closest('.col-row') || related.closest('.table-header'))) return;
  clearAllHighlights();
})

function handleColHover(row, evt) {
  const desc = row.dataset.desc || '';
  const enums = row.dataset.enum || '';
  const isPk = row.classList.contains('pk-row');
  const colName = row.dataset.srcCol || (row.id ? row.id.replace(/^col-[^-]+-/, '') : '');
  const tableName = row.dataset.srcTable || '';

  // PK id 컬럼 마우스오버 시 FK 참조 alias 표시
  let pkAlias = '';
  if (isPk && colName === 'id' && tableName) {
    pkAlias = tableName.replace(/_ro$/, '') + '_id';
  }

  if (!desc && !enums && !pkAlias) return;
  let html = '';
  if (colName) html += `<div class="tt-col">${colName}</div>`;
  if (pkAlias) html += `<div class="tt-item">FK 참조 시: <span style="color:#f9e2af;font-weight:600">${pkAlias}</span></div>`;
  if (desc)  html += `<div class="tt-desc">${desc}</div>`;
  if (enums) html += `<div class="tt-section">가능한 값</div><div class="tt-enums">${enums}</div>`;
  if (html) showTooltip(html, evt);
}

function handleTableHover(hdr, evt) {
  clearAllHighlights();
  syncSvgSize();

  const tableName = hdr.dataset.table;
  const table = TABLES.find(t => t.name === tableName);
  const domain = table?.domain;
  const color = domain ? DOMAIN_COLORS[domain] : '#89b4fa';

  const rels = fkIndex[tableName];
  const relatedTables = new Set([tableName]);
  rels.out.forEach(r => relatedTables.add(r.dstTable));
  rels.in.forEach(r => relatedTables.add(r.srcTable));

  dimAllExcept([...relatedTables]);

  // Draw all FK out lines
  rels.out.forEach(({ srcCol, dstTable, dstCol }) => {
    const srcEl = document.getElementById(colId(tableName, srcCol));
    const dstEl = document.getElementById(colId(dstTable, dstCol));
    if (srcEl) srcEl.classList.add('fk-col-highlighted');
    if (dstEl) dstEl.classList.add('col-highlighted');
    drawLine(srcEl, dstEl, color, domain);
  });

  // Draw all FK in lines (from other tables pointing here)
  rels.in.forEach(({ srcTable, srcCol, dstCol }) => {
    const srcTableDomain = TABLES.find(t => t.name === srcTable)?.domain;
    const srcColor = srcTableDomain ? DOMAIN_COLORS[srcTableDomain] : '#89b4fa';
    const srcEl = document.getElementById(colId(srcTable, srcCol));
    const dstEl = document.getElementById(colId(tableName, dstCol));
    if (srcEl) srcEl.classList.add('fk-col-highlighted');
    if (dstEl) dstEl.classList.add('col-highlighted');
    drawLine(srcEl, dstEl, srcColor, srcTableDomain);
  });

  // Tooltip
  let html = `<div class="tt-title">${tableName}</div>`;
  if (rels.out.length > 0) {
    html += `<div class="tt-item" style="margin-top:4px;color:#f9e2af;font-weight:600;">Outgoing FKs:</div>`;
    rels.out.forEach(r => {
      html += `<div class="tt-item"><span class="tt-out">↗</span> ${r.srcCol} → ${r.dstTable}.${r.dstCol}</div>`;
    });
  }
  if (rels.in.length > 0) {
    html += `<div class="tt-item" style="margin-top:4px;color:#a6e3a1;font-weight:600;">Incoming FKs:</div>`;
    rels.in.forEach(r => {
      html += `<div class="tt-item"><span class="tt-in">↙</span> ${r.srcTable}.${r.srcCol} → ${r.dstCol}</div>`;
    });
  }
  if (rels.out.length === 0 && rels.in.length === 0) {
    html += `<div class="tt-item" style="color:#6c7086;">No FK relationships</div>`;
  }
  showTooltip(html, evt);

  // Redraw on scroll
  activeScrollHandler = () => {
    clearLines();
    syncSvgSize();
    rels.out.forEach(({ srcCol, dstTable, dstCol }) => {
      const srcEl = document.getElementById(colId(tableName, srcCol));
      const dstEl = document.getElementById(colId(dstTable, dstCol));
      drawLine(srcEl, dstEl, color, domain);
    });
    rels.in.forEach(({ srcTable, srcCol, dstCol }) => {
      const srcTableDomain = TABLES.find(t => t.name === srcTable)?.domain;
      const srcColor = srcTableDomain ? DOMAIN_COLORS[srcTableDomain] : '#89b4fa';
      const srcEl = document.getElementById(colId(srcTable, srcCol));
      const dstEl = document.getElementById(colId(tableName, dstCol));
      drawLine(srcEl, dstEl, srcColor, srcTableDomain);
    });
  };
  canvasWrap.addEventListener('scroll', activeScrollHandler);
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════

// Initial sync
window.addEventListener('load', () => {
  syncSvgSize();
});

// Also sync on resize
new ResizeObserver(() => syncSvgSize()).observe(canvas);

// ═══════════════════════════════════════════════════════════════════
// SQL QUERY PANEL
// ═══════════════════════════════════════════════════════════════════
function toggleQueryPanel() {
  document.getElementById('query-panel').classList.toggle('open');
}

(function initQueryPanel() {
  const categories = [...new Set(SQL_QUERIES.map(q => q.category))];
  let activecat = categories[0];

  const tabsEl = document.getElementById('query-category-tabs');
  const listEl = document.getElementById('query-list');

  function renderTabs() {
    tabsEl.innerHTML = categories.map(c =>
      `<button class="qcat-btn${c===activecat?' active':''}" onclick="setQCat('${c}')">${c}</button>`
    ).join('');
  }

  function renderList() {
    const items = SQL_QUERIES.filter(q => q.category === activecat);
    listEl.innerHTML = items.map((q, i) => `
      <div class="query-item">
        <div class="query-item-header" onclick="toggleQuery(this)">
          <span>${q.title}</span>
          <button class="copy-btn" onclick="event.stopPropagation();copyQuery(${SQL_QUERIES.indexOf(q)})">복사</button>
        </div>
        <div class="query-item-body">
          <pre>${q.sql}</pre>
        </div>
      </div>`).join('');
  }

  window.setQCat = function(cat) { activecat = cat; renderTabs(); renderList(); };
  window.toggleQuery = function(hdr) { hdr.nextElementSibling.classList.toggle('open'); };
  window.copyQuery = function(idx) {
    navigator.clipboard.writeText(SQL_QUERIES[idx].sql).then(() => {
      const btn = document.querySelectorAll('.copy-btn')[SQL_QUERIES.filter(q=>q.category===activecat).indexOf(SQL_QUERIES[idx])];
      if (btn) { btn.textContent = '복사됨!'; setTimeout(() => btn.textContent = '복사', 1500); }
    });
  };

  renderTabs();
  renderList();
})();
</script>
